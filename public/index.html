<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebAMT — Intel AMT Console</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f8cff'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>A</text></svg>">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div>
                <div class="title">WebAMT</div>
                <div class="sub">Intel&reg; AMT Console</div>
            </div>
        </div>
        <div class="dev-head">
            <span>Devices</span>
            <div class="btn sm icon" id="btnAddDevice" title="Add device">＋</div>
        </div>
        <div class="dev-list" id="devList"></div>
        <div class="sidebar-foot">
            <div class="btn sm block" id="btnTheme">🌓 Theme</div>
            <div class="btn sm icon" id="btnImport" title="Import devices">⭳</div>
            <div class="btn sm icon" id="btnExport" title="Export devices">⭱</div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <div>
                <div class="tb-title" id="tbTitle">No device selected</div>
                <div class="tb-sub" id="tbSub">Add or select an Intel AMT device to begin</div>
            </div>
            <div class="spacer"></div>
            <span class="badge" id="tbPower" style="display:none"></span>
            <span class="badge" id="tbConn" style="display:none"></span>
            <div class="btn primary" id="btnConnect" style="display:none">Connect</div>
        </div>
        <div class="tabs" id="tabs" style="display:none"></div>
        <div class="progline" id="progline"></div>
        <div class="content" id="content"></div>
    </main>
</div>

<div id="modalRoot"></div>
<div class="toasts" id="toasts"></div>

<!-- AMT protocol engine (vendored from MeshCommander, Apache-2.0) + modern support -->
<script src="js/engine/helpers.js"></script>
<script src="js/engine/md5.js"></script>
<script src="js/engine/zlib.js"></script>
<script src="js/engine/wsman-comm.js"></script>
<script src="js/engine/wsman-stack.js"></script>
<script src="js/engine/amt-stack.js"></script>
<script src="js/engine/redirection.js"></script>
<script src="js/engine/terminal.js"></script>
<script src="js/engine/kvm.js"></script>
<script src="js/engine/ider.js"></script>

<!-- Shared application plumbing -->
<script src="js/ui.js"></script>
<script src="js/amt-data.js"></script>
<script src="js/core/icons.js"></script>
<script src="js/core/dom.js"></script>
<script src="js/core/amt.js"></script>

<!-- Feature views (register into Views) -->
<script src="js/features/registry.js"></script>
<script src="js/features/dashboard.js"></script>
<script src="js/features/hardware.js"></script>
<script src="js/features/logs.js"></script>
<script src="js/features/network.js"></script>
<script src="js/features/users.js"></script>
<script src="js/features/settings.js"></script>
<script src="js/features/explorer.js"></script>

<!-- Redirection viewers (SOL + KVM) -->
<script src="js/remote/keys.js"></script>
<script src="js/remote/common.js"></script>
<script src="js/remote/terminal.js"></script>
<script src="js/remote/desktop.js"></script>
<script src="js/remote/ider.js"></script>

<!-- Application core -->
<script src="js/app.js"></script>
</body>
</html>
