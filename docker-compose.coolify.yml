# WebAMT — Coolify deployment (Docker Compose build pack).
#
# Deploy: Coolify -> New Resource -> Docker Compose -> pick this repo, set this file as
# the compose path. Then:
#   1. In Coolify -> Environment Variables, set MPS_USER and MPS_PASS (the credentials AMT
#      devices present for CIRA — must match the CIRA profile on the machines). Coolify
#      injects these into the container and the app reads them directly, so they are NOT
#      referenced with ${...} here. That is deliberate: a '$' in the password would
#      otherwise be eaten by Docker Compose interpolation and silently truncate it.
#   2. Attach a domain to the web console (port 3000) in the Coolify UI — Coolify proxies
#      it and issues Let's Encrypt TLS automatically.
#   3. Open inbound TCP 4433 on the host/firewall. 4433 is a RAW TLS listener (the AMT
#      device validates its certificate end-to-end), so it MUST be a raw host port
#      mapping — never routed through Coolify's HTTP proxy (Traefik). The `ports:` entry
#      below binds it directly on the host, bypassing the proxy.
#
# If you don't need CIRA, remove the MPS* environment entries and the 4433 mapping.

services:
  webamt:
    build: .
    restart: unless-stopped

    # Web console — proxied by Coolify. Attach your domain to this service in the UI.
    expose:
      - "3000"

    # MPS/CIRA raw TLS port — bound directly on the host, bypassing the proxy.
    # AMT devices connect here at <your-server>:4433.
    ports:
      - "4433:4433"

    environment:
      # Enable the MPS/CIRA listener and bind on all interfaces. These have no '$',
      # so referencing them here is safe.
      - MPS=1
      - WEBAMT_ANY=1
      # Persist the self-signed MPS certificate on the volume below so AMT devices keep
      # trusting the same cert across redeploys.
      - MPS_CERT=/certs/mps-cert.pem
      - MPS_KEY=/certs/mps-key.pem
      # MPS_USER / MPS_PASS come from the Coolify Environment Variables UI (see note above).

    volumes:
      - webamt-certs:/certs

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/info',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  webamt-certs:
