# WebAMT — Coolify deployment (Docker Compose build pack).
#
# Deploy: Coolify -> New Resource -> Docker Compose -> pick this repo, and set this
# file as the compose path. Then:
#   1. Set MPS_USER / MPS_PASS as Environment Variables in Coolify (secrets). These
#      must match the CIRA profile provisioned on your Intel AMT machines.
#   2. Attach a domain to the web console in the Coolify UI — Coolify proxies port
#      3000 and issues Let's Encrypt TLS automatically.
#   3. Open inbound TCP 4433 on the host/firewall so AMT devices can dial into the
#      MPS. 4433 is a RAW TLS listener (not HTTP), so it bypasses the proxy via the
#      direct port mapping below — it does not get a domain.
#
# If you don't need CIRA, drop the `command:` line (and the 4433 mapping) to run the
# web console / direct relay only.

services:
  webamt:
    build: .
    restart: unless-stopped

    # Web console — proxied by Coolify. Attach your domain to this service in the UI.
    expose:
      - "3000"

    # MPS/CIRA raw TLS port — bound directly on the host, bypassing the proxy.
    # AMT devices connect here at <your-server>:4433.
    ports:
      - "4433:4433"

    # Enable the MPS/CIRA listener. Secrets are substituted from the environment,
    # so they are never baked into the image. Remove this line for web-console-only.
    command: ["node", "server.js", "--any", "--mps", "--mps-user", "${MPS_USER}", "--mps-pass", "${MPS_PASS}", "--mps-cert", "/certs/mps-cert.pem", "--mps-key", "/certs/mps-key.pem"]

    environment:
      - MPS_USER=${MPS_USER}
      - MPS_PASS=${MPS_PASS}

    # Persist the MPS TLS certificate across redeploys so AMT devices keep trusting
    # it. On first run WebAMT writes a self-signed pair here; replace with your own
    # PEM files if your devices are provisioned to trust a specific certificate.
    volumes:
      - webamt-certs:/certs

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/info',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  webamt-certs:
